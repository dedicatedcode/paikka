services:
  paikka:
    image: dedicatedcode/paikka:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - ADMIN_PASSWORD=your-password-here
      - BASE_URL=http://localhost:8080
    volumes:
      - paikka-data:/data
      - paikka-stats:/stats

volumes:
  paikka-data:
  paikka-stats:
