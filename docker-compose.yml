services:
  paikka:
    image: dedicatedcode/paikka:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - ADMIN_PASSWORD=your-password-here
      - BASE_URL=http://localhost:8080
    volumes:
      - paikka-data:/data
      - paikka-stats:/stats
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  paikka-data:
  paikka-stats:
